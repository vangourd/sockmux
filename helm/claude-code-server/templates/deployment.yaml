apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "claude-code-server.fullname" . }}
  labels:
    {{- include "claude-code-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "claude-code-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "claude-code-server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "claude-code-server.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: ssh
          containerPort: 2222
          protocol: TCP
        volumeMounts:
        - name: home
          mountPath: /home/claude
        - name: ssh-keys
          mountPath: /ssh-keys
          readOnly: true
        - name: ssh-host-keys
          mountPath: /etc/ssh
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        env:
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- if .Values.existingApiKeySecret.name }}
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ .Values.existingApiKeySecret.name }}
              key: {{ .Values.existingApiKeySecret.key }}
        {{- end }}
        {{- if .Values.squidProxy.enabled }}
        - name: HTTP_PROXY
          value: "http://{{ include "claude-code-server.fullname" . }}-squid:3128"
        - name: HTTPS_PROXY
          value: "http://{{ include "claude-code-server.fullname" . }}-squid:3128"
        - name: http_proxy
          value: "http://{{ include "claude-code-server.fullname" . }}-squid:3128"
        - name: https_proxy
          value: "http://{{ include "claude-code-server.fullname" . }}-squid:3128"
        - name: NO_PROXY
          value: "localhost,127.0.0.1,{{ .Values.squidProxy.noProxy }}"
        - name: no_proxy
          value: "localhost,127.0.0.1,{{ .Values.squidProxy.noProxy }}"
        {{- end }}
        {{- if .Values.opentelemetry.enabled }}
        # OpenTelemetry configuration
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: {{ .Values.opentelemetry.endpoint | quote }}
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: {{ .Values.opentelemetry.protocol | quote }}
        - name: OTEL_SERVICE_NAME
          value: {{ .Values.opentelemetry.serviceName | quote }}
        {{- if .Values.opentelemetry.resourceAttributes }}
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: {{ include "claude-code-server.otelResourceAttributes" . | quote }}
        {{- end }}
        {{- if .Values.opentelemetry.tracesSampler }}
        - name: OTEL_TRACES_SAMPLER
          value: {{ .Values.opentelemetry.tracesSampler | quote }}
        {{- end }}
        {{- if .Values.opentelemetry.tracesSamplerArg }}
        - name: OTEL_TRACES_SAMPLER_ARG
          value: {{ .Values.opentelemetry.tracesSamplerArg | quote }}
        {{- end }}
        {{- if .Values.opentelemetry.exportTimeoutMillis }}
        - name: OTEL_EXPORTER_OTLP_TIMEOUT
          value: {{ .Values.opentelemetry.exportTimeoutMillis | quote }}
        {{- end }}
        {{- if .Values.opentelemetry.exportIntervalMillis }}
        - name: OTEL_METRIC_EXPORT_INTERVAL
          value: {{ .Values.opentelemetry.exportIntervalMillis | quote }}
        {{- end }}
        {{- if .Values.opentelemetry.headers }}
        - name: OTEL_EXPORTER_OTLP_HEADERS
          value: {{ include "claude-code-server.otelHeaders" . | quote }}
        {{- end }}
        {{- if .Values.opentelemetry.existingSecret.name }}
        - name: OTEL_EXPORTER_OTLP_HEADERS
          valueFrom:
            secretKeyRef:
              name: {{ .Values.opentelemetry.existingSecret.name }}
              key: headers
        {{- end }}
        {{- end }}
      volumes:
      - name: home
        {{- if .Values.persistence.enabled }}
        persistentVolumeClaim:
          claimName: {{ include "claude-code-server.fullname" . }}
        {{- else }}
        emptyDir: {}
        {{- end }}
      - name: ssh-keys
        {{- if .Values.sshKeys.existingSecret }}
        secret:
          secretName: {{ .Values.sshKeys.existingSecret }}
          defaultMode: 0600
          items:
          - key: {{ .Values.sshKeys.existingSecretKey }}
            path: authorized_keys
        {{- else }}
        configMap:
          name: {{ include "claude-code-server.fullname" . }}-ssh-keys
          defaultMode: 0600
        {{- end }}
      - name: ssh-host-keys
        emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
