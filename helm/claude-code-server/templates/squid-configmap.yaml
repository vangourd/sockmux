{{- if .Values.squidProxy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "claude-code-server.fullname" . }}-squid-config
  labels:
    {{- include "claude-code-server.labels" . | nindent 4 }}
data:
  squid.conf: |
    # Squid proxy configuration for Claude Code

    # Port configuration
    http_port 3128

    # Access control lists
    acl localnet src 10.0.0.0/8
    acl localnet src 172.16.0.0/12
    acl localnet src 192.168.0.0/16
    acl SSL_ports port 443
    acl CONNECT method CONNECT

    # Allowed domains
    {{- range .Values.squidProxy.allowedDomains }}
    acl allowed_domains dstdomain {{ . }}
    {{- end }}

    # Allowed IPs (for services that don't have stable domains)
    {{- if .Values.squidProxy.allowedIPs }}
    {{- range .Values.squidProxy.allowedIPs }}
    acl allowed_ips dst {{ . }}
    {{- end }}
    {{- end }}

    # Allow localhost
    acl localhost src 127.0.0.1/32

    # Deny direct IP access (force domain names)
    {{- if .Values.squidProxy.denyDirectIP }}
    acl numeric_IPs dstdom_regex ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$
    http_access deny numeric_IPs !allowed_ips
    {{- end }}

    # Access rules
    http_access deny !SSL_ports CONNECT
    http_access allow localhost
    http_access allow localnet allowed_domains
    {{- if .Values.squidProxy.allowedIPs }}
    http_access allow localnet allowed_ips
    {{- end }}
    http_access deny all

    # Logging
    access_log stdio:/dev/stdout combined
    cache_log stdio:/dev/stderr

    # No caching (optional: enable if you want caching)
    {{- if not .Values.squidProxy.enableCache }}
    cache deny all
    {{- else }}
    cache_dir ufs /var/spool/squid 100 16 256
    {{- end }}

    # DNS configuration
    dns_nameservers {{ join " " .Values.squidProxy.dnsServers }}

    # Timeouts
    connect_timeout 30 seconds
    read_timeout 300 seconds
    request_timeout 60 seconds

    # Forwarding
    {{- if .Values.squidProxy.parentProxy.enabled }}
    cache_peer {{ .Values.squidProxy.parentProxy.host }} parent {{ .Values.squidProxy.parentProxy.port }} 0 no-query default
    never_direct allow all
    {{- end }}

    # Custom config
    {{- if .Values.squidProxy.customConfig }}
    {{ .Values.squidProxy.customConfig | nindent 4 }}
    {{- end }}
{{- end }}
