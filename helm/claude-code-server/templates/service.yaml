apiVersion: v1
kind: Service
metadata:
  name: {{ include "claude-code-server.fullname" . }}
  labels:
    {{- include "claude-code-server.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  {{- if .Values.service.loadBalancerIP }}
  loadBalancerIP: {{ .Values.service.loadBalancerIP }}
  {{- end }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: ssh
    protocol: TCP
    name: ssh
  selector:
    {{- include "claude-code-server.selectorLabels" . | nindent 4 }}
