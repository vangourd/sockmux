# Default values for claude-code-server
replicaCount: 1

image:
  repository: ghcr.io/vangourd/sockmux
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault
  # Prevent privilege escalation at pod level
  supplementalGroups: []

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false
  privileged: false
  seccompProfile:
    type: RuntimeDefault
  # AppArmor profile (if available on nodes)
  # appArmorProfile:
  #   type: RuntimeDefault

service:
  type: LoadBalancer
  port: 2222
  annotations: {}
  # loadBalancerIP: ""

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  annotations: {}

sshKeys:
  # Provide SSH public keys here
  # Example:
  # authorizedKeys: |
  #   ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAAB... user@host
  authorizedKeys: ""
  # Or use an existing secret
  existingSecret: ""
  existingSecretKey: "authorized_keys"

env:
  # Experimental agent teams feature
  CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
  # Optional: Set Anthropic API key
  # ANTHROPIC_API_KEY: ""

# Use existing secret for API key
existingApiKeySecret:
  name: ""
  key: "api-key"

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "2000m"

nodeSelector: {}

tolerations: []

affinity: {}

# Pod disruption budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy - isolate to namespace
networkPolicy:
  enabled: true  # Enabled by default for security

  ingress:
    # Sources allowed to connect to SSH port
    # Empty list means allow from anywhere (SSH key auth provides security)
    allowedSources: []
    # Example: Only allow from specific namespace
    # allowedSources:
    #   - namespaceSelector:
    #       matchLabels:
    #         name: allowed-namespace
    # Example: Only allow from specific pods
    #   - podSelector:
    #       matchLabels:
    #         app: allowed-app

  egress:
    # When squidProxy.enabled=false, these destinations are allowed
    # Empty means allow all (Squid ACL or firewall provides filtering)
    allowedDestinations: []
    # Example: Restrict to specific CIDRs
    # allowedDestinations:
    #   - ipBlock:
    #       cidr: 0.0.0.0/0
    #       except:
    #         - 169.254.169.254/32  # Block AWS metadata
    #         - 10.0.0.0/8          # Block internal networks

    # Additional custom egress rules
    customRules: []
    # Example: Allow NTP
    # customRules:
    #   - to:
    #     - {}
    #     ports:
    #     - protocol: UDP
    #       port: 123

# Squid Proxy for domain-based egress filtering
squidProxy:
  enabled: true  # Enabled by default for security
  replicaCount: 1

  image:
    repository: ubuntu/squid
    tag: "latest"
    pullPolicy: IfNotPresent

  # Domain allowlist - only these domains can be accessed
  allowedDomains:
    # Anthropic API
    - .anthropic.com
    - api.anthropic.com

    # GitHub (for git operations, nix packages)
    - .github.com
    - github.com
    - .githubusercontent.com
    - api.github.com
    - raw.githubusercontent.com

    # NixOS cache and packages
    - .nixos.org
    - nixos.org
    - cache.nixos.org
    - channels.nixos.org

    # Common package registries (uncomment as needed)
    # - .npmjs.org
    # - registry.npmjs.org
    # - .pypi.org
    # - pypi.org
    # - .crates.io
    # - crates.io

    # Common CDNs (uncomment as needed)
    # - .cloudflare.com
    # - .fastly.net
    # - .akamai.net

  # Optional: Allow specific IPs (for services without stable domains)
  allowedIPs: []
    # - 1.2.3.4/32

  # Deny direct IP access (force domain names for better logging/control)
  denyDirectIP: true

  # DNS servers for Squid to use
  dnsServers:
    - "8.8.8.8"
    - "8.8.4.4"

  # NO_PROXY bypass list (comma-separated, no spaces)
  noProxy: ".svc,.svc.cluster.local"

  # Enable caching (optional, saves bandwidth)
  enableCache: false

  # Optional: Forward to parent proxy
  parentProxy:
    enabled: false
    host: "parent-proxy.example.com"
    port: 3128

  # Custom squid.conf additions
  customConfig: ""

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  # NetworkPolicy egress destinations for Squid proxy itself
  allowedDestinations: []
  # Example: Restrict Squid to specific IPs
  # allowedDestinations:
  #   - ipBlock:
  #       cidr: 0.0.0.0/0

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 13
    runAsGroup: 13
    fsGroup: 13
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    runAsNonRoot: true
    runAsUser: 13
    runAsGroup: 13
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: false
    allowPrivilegeEscalation: false
    privileged: false
    seccompProfile:
      type: RuntimeDefault

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
