# Default values for claude-code-server
replicaCount: 1

image:
  repository: ghcr.io/vangourd/sockmux
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  allowPrivilegeEscalation: false

service:
  type: LoadBalancer
  port: 2222
  annotations: {}
  # loadBalancerIP: ""

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  annotations: {}

sshKeys:
  # Provide SSH public keys here
  # Example:
  # authorizedKeys: |
  #   ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAAB... user@host
  authorizedKeys: ""
  # Or use an existing secret
  existingSecret: ""
  existingSecretKey: "authorized_keys"

env:
  # Experimental agent teams feature
  CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS: "1"
  # Optional: Set Anthropic API key
  # ANTHROPIC_API_KEY: ""

# Use existing secret for API key
existingApiKeySecret:
  name: ""
  key: "api-key"

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "2000m"

nodeSelector: {}

tolerations: []

affinity: {}

# Pod disruption budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1

# Network policy
networkPolicy:
  enabled: false
  policyTypes:
    - Egress
  egress:
    # Allow DNS
    - ports:
      - protocol: UDP
        port: 53
    # Allow HTTPS to Anthropic API
    - to:
      - namespaceSelector: {}
      ports:
      - protocol: TCP
        port: 443

# Squid Proxy for domain-based egress filtering
squidProxy:
  enabled: false
  replicaCount: 1

  image:
    repository: ubuntu/squid
    tag: "latest"
    pullPolicy: IfNotPresent

  # Domain allowlist - only these domains can be accessed
  allowedDomains:
    # Anthropic API
    - .anthropic.com
    - api.anthropic.com

    # GitHub (for git operations, nix packages)
    - .github.com
    - github.com
    - .githubusercontent.com
    - api.github.com
    - raw.githubusercontent.com

    # NixOS cache and packages
    - .nixos.org
    - nixos.org
    - cache.nixos.org
    - channels.nixos.org

    # Common package registries (uncomment as needed)
    # - .npmjs.org
    # - registry.npmjs.org
    # - .pypi.org
    # - pypi.org
    # - .crates.io
    # - crates.io

    # Common CDNs (uncomment as needed)
    # - .cloudflare.com
    # - .fastly.net
    # - .akamai.net

  # Optional: Allow specific IPs (for services without stable domains)
  allowedIPs: []
    # - 1.2.3.4/32

  # Deny direct IP access (force domain names for better logging/control)
  denyDirectIP: true

  # DNS servers for Squid to use
  dnsServers:
    - "8.8.8.8"
    - "8.8.4.4"

  # NO_PROXY bypass list (comma-separated, no spaces)
  noProxy: ".svc,.svc.cluster.local"

  # Enable caching (optional, saves bandwidth)
  enableCache: false

  # Optional: Forward to parent proxy
  parentProxy:
    enabled: false
    host: "parent-proxy.example.com"
    port: 3128

  # Custom squid.conf additions
  customConfig: ""

  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "500m"

  podSecurityContext:
    fsGroup: 13
    runAsUser: 13
    runAsGroup: 13

  podAnnotations: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
